apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: blog-gateway
  namespace: prod
spec:
  selector:
    istio: ingressgateway # This connects to the default Istio ingress controller
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: blog-routing
  namespace: prod
spec:
  hosts:
  - "*"
  gateways:
  - blog-gateway
  http:
  - route:
    - destination:
        host: blog-svc.prod.svc.cluster.local
        port:
          number: 80
    # THIS IS THE MAGIC LINE FOR PROJECT SHADOW-SHIFT
    mirror:
      host: blog-svc.shadow.svc.cluster.local
      port:
        number: 80
